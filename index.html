<script>
// ==============================
// 設定（ここだけ見れば全体が分かる）
// ==============================
const CONFIG = {
  MAX_CHARS: 6,
  SPAWN_INTERVAL: 900,
  REMOVE_DELAY_BUFFER: 2000,
  MIN_DISTANCE: 200,
  EDGE_OFFSET: 150,
  ANIMATION_MIN: 5,
  ANIMATION_RANGE: 4
};

// ==============================
// キャラクター画像
// ==============================
const charImages = [
  "ikehaya.webp","leelee.webp","Leeleeg.webp","luna.webp",
  "makamih.webp","makamio.webp","mitamag.webp","mitaman.webp",
  "narukami.webp","narukamik.webp",
  "Road.webp","runa.webp","setuna.webp","towa.webp","yama.webp","yamar.webp"
];

// ==============================
// 状態管理
// ==============================
const activeCharacters = new Set();
let currentCount = 0;

const stage = document.getElementById("opening-stage");
const bgm = document.getElementById("bgm");
const startBtn = document.getElementById("start-btn");

// ==============================
// オーディオ制御
// ==============================
function fadeInVolume() {
  let volume = 0;
  bgm.volume = 0;

  const id = setInterval(() => {
    volume += 0.05;
    bgm.volume = Math.min(volume, 1);

    if (volume >= 1) clearInterval(id);
  }, 100);
}

function attemptPlay() {
  if (!bgm.paused) return;

  bgm.play()
    .then(fadeInVolume)
    .catch(() => {});
}

window.addEventListener("load", attemptPlay);
stage.addEventListener("click", attemptPlay);
stage.addEventListener("touchstart", attemptPlay, { passive: true });

// ==============================
// ユーティリティ
// ==============================
const getStageWidth = () => stage.clientWidth;
const getStageHeight = () => stage.clientHeight;

function getRandomEdgePosition() {
  const edge = Math.floor(Math.random() * 4);

  switch (edge) {
    case 0: return { x: Math.random() * getStageWidth(), y: -CONFIG.EDGE_OFFSET };
    case 1: return { x: getStageWidth() + CONFIG.EDGE_OFFSET, y: Math.random() * getStageHeight() };
    case 2: return { x: Math.random() * getStageWidth(), y: getStageHeight() + CONFIG.EDGE_OFFSET };
    default: return { x: -CONFIG.EDGE_OFFSET, y: Math.random() * getStageHeight() };
  }
}

function isTooClose(start, end) {
  return (
    Math.abs(start.x - end.x) < CONFIG.MIN_DISTANCE &&
    Math.abs(start.y - end.y) < CONFIG.MIN_DISTANCE
  );
}

function getRandomImage() {
  const available = charImages.filter(src => !activeCharacters.has(src));
  const pool = available.length ? available : charImages;

  return pool[Math.floor(Math.random() * pool.length)];
}

// ==============================
// DOM生成
// ==============================
function createCharacterElement(src) {
  const wrapper = document.createElement("div");
  wrapper.className = "char";

  const img = document.createElement("img");
  img.src = src;

  wrapper.appendChild(img);
  return wrapper;
}

function applyAnimation(wrapper, start, end) {
  wrapper.style.setProperty("--startX", `${start.x}px`);
  wrapper.style.setProperty("--startY", `${start.y}px`);
  wrapper.style.setProperty("--endX", `${end.x}px`);
  wrapper.style.setProperty("--endY", `${end.y}px`);

  const duration = CONFIG.ANIMATION_MIN + Math.random() * CONFIG.ANIMATION_RANGE;
  wrapper.style.animationDuration = `${duration}s`;

  return duration;
}

// ==============================
// メイン処理
// ==============================
function spawnCharacter() {
  const src = getRandomImage();
  const element = createCharacterElement(src);

  const start = getRandomEdgePosition();
  let end = getRandomEdgePosition();

  while (isTooClose(start, end)) {
    end = getRandomEdgePosition();
  }

  const duration = applyAnimation(element, start, end);

  stage.appendChild(element);
  activeCharacters.add(src);

  setTimeout(() => {
    element.remove();
    activeCharacters.delete(src);
  }, duration * 1000);
}

// ==============================
// ループ制御
// ==============================
setInterval(() => {
  if (currentCount < CONFIG.MAX_CHARS) {
    spawnCharacter();
    currentCount++;

    setTimeout(() => {
      currentCount--;
    }, CONFIG.REMOVE_DELAY_BUFFER + CONFIG.ANIMATION_MIN * 1000);
  }
}, CONFIG.SPAWN_INTERVAL);

// ==============================
// 星生成（そのままでもOK）
// ==============================
(function createStars() {
  const colors = ["c1", "c2", "c3"];
  const COUNT = 60;

  for (let i = 0; i < COUNT; i++) {
    const star = document.createElement("div");
    star.className = `star ${colors[i % colors.length]}`;

    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";

    const size = 3 + Math.random() * 3;
    star.style.width = star.style.height = size + "px";

    star.style.animationDelay = Math.random() * 4 + "s";
    star.style.animationDuration = 4 + Math.random() * 3 + "s";

    document.body.appendChild(star);
  }
})();

// ==============================
// スタートボタン
// ==============================
startBtn.addEventListener("click", () => {
  attemptPlay();

  startBtn.style.pointerEvents = "none";
  startBtn.style.opacity = "0";

  setTimeout(() => {
    location.href = "character_select.html";
  }, 500);
});
</script>
